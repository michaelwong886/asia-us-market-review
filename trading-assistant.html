<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trading Assistant Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --font-body:'Inter',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --text-xs:clamp(0.7rem,0.65rem + 0.25vw,0.875rem);--text-sm:clamp(0.8rem,0.75rem + 0.35vw,1rem);
  --text-base:clamp(0.9rem,0.85rem + 0.25vw,1.125rem);--text-lg:clamp(1rem,0.9rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.2rem,1rem + 1.25vw,2.25rem);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0d0f11;--surface:#131618;--surface-2:#181b1e;--surface-3:#1e2226;
  --border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);
  --text:#e2e4e8;--text-muted:#7a8090;--text-faint:#454a54;
  --accent:#00c9a7;--accent-dim:rgba(0,201,167,0.12);
  --up:#22c55e;--up-dim:rgba(34,197,94,0.12);
  --down:#ef4444;--down-dim:rgba(239,68,68,0.12);
  --warn:#f59e0b;--warn-dim:rgba(245,158,11,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#a855f7;--gold:#fbbf24;--gold-dim:rgba(251,191,36,0.12);
  --shadow:0 4px 24px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:var(--text-sm);color:var(--text);background:var(--bg);min-height:100vh;display:flex;overflow:hidden}
.sidebar{width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;z-index:100;flex-shrink:0}
.sidebar-logo{padding:var(--space-4) var(--space-4) var(--space-3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--space-2);overflow:hidden}
.logo-icon{width:28px;height:28px;background:var(--accent);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-weight:700;font-size:var(--text-xs);letter-spacing:-0.01em;white-space:nowrap}
.logo-sub{font-size:0.65rem;color:var(--text-muted);white-space:nowrap}
.sidebar-nav{flex:1;padding:var(--space-2);overflow-y:auto}
.nav-section-label{font-size:0.6rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);padding:var(--space-2) var(--space-2) var(--space-1)}
.nav-item{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2);border-radius:var(--radius-md);cursor:pointer;color:var(--text-muted);font-size:var(--text-xs);font-weight:500;transition:all var(--transition);border:none;background:none;width:100%;text-align:left;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item i{width:15px;height:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--down);color:#fff;font-size:0.6rem;font-weight:700;padding:1px 5px;border-radius:99px;flex-shrink:0}
.sidebar-footer{padding:var(--space-3);border-top:1px solid var(--border);font-size:var(--text-xs);color:var(--text-muted);display:flex;align-items:center;gap:var(--space-2);overflow:hidden}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--up);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:var(--space-2) var(--space-3);display:flex;align-items:center;gap:var(--space-2);flex-shrink:0;overflow:hidden;flex-wrap:wrap}
.topbar-title{font-size:var(--text-sm);font-weight:700;flex:1;letter-spacing:-0.02em;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-chips{display:flex;gap:var(--space-1);flex-shrink:0}
.session-chip{font-size:0.65rem;padding:2px 8px;border-radius:99px;font-weight:600;font-family:var(--font-mono);border:1px solid var(--border-strong);color:var(--text-muted);white-space:nowrap}
