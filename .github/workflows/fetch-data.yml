name: Fetch Market Data

on:
  schedule:
    # Every 15 min Mon–Fri, 01:30–08:00 UTC (09:30–16:00 HKT)
    - cron: "*/15 1-8 * * 1-5"
    # US session: Mon–Fri 13:30–21:00 UTC
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline.py --output data.json --pretty

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: auto-update data.json [skip ci]"
          git push
